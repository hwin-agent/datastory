services:
  - type: web
    name: datastory-backend
    runtime: python
    region: ohio
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ZAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
